name: Deploy Multi-Cloud Image Classification

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'apply'
        type: choice
        options:
          - plan
          - apply
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  TF_VERSION: "1.7.0"
  TF_INPUT: false
  PROJECT_PREFIX: ${{ vars.PROJECT_PREFIX || 'imgclass' }}
  # Determine if this is a plan-only run (PR) or apply run (manual workflow_dispatch)
  IS_PLAN_ONLY: ${{ github.event_name == 'pull_request' }}

  # AWS credentials
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

  # Azure credentials
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

permissions:
  contents: read

jobs:
  # =========================================================================
  # Step 1a: Deploy Azure (Communication Services for email)
  # =========================================================================
  deploy-azure:
    name: "Azure — Email Service"
    runs-on: ubuntu-latest
    outputs:
      email_connection_string: ${{ steps.outputs.outputs.email_connection_string }}
      sender_address: ${{ steps.outputs.outputs.sender_address }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Derive Azure backend names
        id: backend
        run: |
          SUB_SHORT=$(echo "$ARM_SUBSCRIPTION_ID" | tr -d '-' | cut -c1-8)
          echo "rg_name=${{ env.PROJECT_PREFIX }}-tf-state-rg-${SUB_SHORT}" >> "$GITHUB_OUTPUT"
          echo "storage_account=${{ env.PROJECT_PREFIX }}tf${SUB_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        working-directory: terraform/azure
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ steps.backend.outputs.rg_name }}" \
            -backend-config="storage_account_name=${{ steps.backend.outputs.storage_account }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=azure.tfstate"

      - name: Terraform Plan
        working-directory: terraform/azure
        run: |
          terraform plan \
            -var="project_prefix=${{ env.PROJECT_PREFIX }}" \
            -var="azure_location=${{ vars.AZURE_LOCATION || 'eastus' }}" \
            -var="notification_email=${{ vars.NOTIFICATION_EMAIL }}" \
            -out=tfplan

      - name: Terraform Apply
        if: github.event_name != 'pull_request' && github.event.inputs.action != 'plan'
        working-directory: terraform/azure
        run: terraform apply -auto-approve tfplan

      - name: Get Outputs
        id: outputs
        if: github.event_name != 'pull_request'
        working-directory: terraform/azure
        run: |
          echo "email_connection_string=$(terraform output -raw communication_service_connection_string)" >> "$GITHUB_OUTPUT"
          echo "sender_address=$(terraform output -raw sender_address)" >> "$GITHUB_OUTPUT"

  # =========================================================================
  # Step 1b: Deploy AWS Initial (S3 + API Gateway + Static Site + EventBridge with placeholders)
  # Runs in parallel with deploy-azure
  # =========================================================================
  deploy-aws-initial:
    name: "AWS — Initial Setup"
    runs-on: ubuntu-latest
    outputs:
      image_bucket_name: ${{ steps.outputs.outputs.image_bucket_name }}
      image_bucket_arn: ${{ steps.outputs.outputs.image_bucket_arn }}
      website_url: ${{ steps.outputs.outputs.website_url }}
      api_gateway_url: ${{ steps.outputs.outputs.api_gateway_url }}
      gcp_function_role_arn: ${{ steps.outputs.outputs.gcp_function_role_arn }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Get AWS Account ID
        id: aws-id
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        working-directory: terraform/aws
        run: |
          terraform init \
            -backend-config="bucket=${{ env.PROJECT_PREFIX }}-tf-state-${{ steps.aws-id.outputs.account_id }}" \
            -backend-config="key=aws/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        working-directory: terraform/aws
        run: |
          terraform plan \
            -var="project_prefix=${{ env.PROJECT_PREFIX }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="gcp_function_url=https://placeholder" \
            -var="eventbridge_auth_token=placeholder" \
            -var="gcp_service_account_unique_id=placeholder" \
            -out=tfplan

      - name: Terraform Apply
        if: github.event_name != 'pull_request' && github.event.inputs.action != 'plan'
        working-directory: terraform/aws
        run: terraform apply -auto-approve tfplan

      - name: Get Outputs
        id: outputs
        if: github.event_name != 'pull_request'
        working-directory: terraform/aws
        run: |
          echo "image_bucket_name=$(terraform output -raw image_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "image_bucket_arn=$(terraform output -raw image_bucket_arn)" >> "$GITHUB_OUTPUT"
          echo "website_url=$(terraform output -raw website_url)" >> "$GITHUB_OUTPUT"
          echo "api_gateway_url=$(terraform output -raw api_gateway_invoke_url)" >> "$GITHUB_OUTPUT"
          echo "gcp_function_role_arn=$(terraform output -raw gcp_function_role_arn)" >> "$GITHUB_OUTPUT"

  # =========================================================================
  # Step 2: Deploy GCP (Cloud Function + Secrets + Vertex AI)
  # Depends on Azure (email creds) and AWS Initial (S3 bucket name + credentials)
  # =========================================================================
  deploy-gcp:
    name: "GCP — Classification Function"
    runs-on: ubuntu-latest
    needs: [deploy-azure, deploy-aws-initial]
    if: always() && (needs.deploy-azure.result == 'success' && needs.deploy-aws-initial.result == 'success')
    outputs:
      function_url: ${{ steps.outputs.outputs.function_url }}
      eventbridge_auth_token: ${{ steps.outputs.outputs.eventbridge_auth_token }}
      service_account_unique_id: ${{ steps.outputs.outputs.service_account_unique_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Authenticate to GCP
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' | base64 -d > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> "$GITHUB_ENV"

      - name: Terraform Init
        working-directory: terraform/gcp
        run: |
          terraform init \
            -backend-config="bucket=${{ env.PROJECT_PREFIX }}-tf-state-${{ vars.GCP_PROJECT_ID }}" \
            -backend-config="prefix=gcp"

      - name: Terraform Plan
        working-directory: terraform/gcp
        run: |
          # Use placeholder values for PR plans when outputs aren't available
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            S3_BUCKET="placeholder-bucket"
            AWS_ROLE_ARN="arn:aws:iam::000000000000:role/placeholder"
            AZURE_CONN="placeholder-connection"
            AZURE_SENDER="donotreply@placeholder.com"
          else
            S3_BUCKET="${{ needs.deploy-aws-initial.outputs.image_bucket_name }}"
            AWS_ROLE_ARN="${{ needs.deploy-aws-initial.outputs.gcp_function_role_arn }}"
            AZURE_CONN="${{ needs.deploy-azure.outputs.email_connection_string }}"
            AZURE_SENDER="${{ needs.deploy-azure.outputs.sender_address }}"
          fi
          
          terraform plan \
            -var="project_prefix=${{ env.PROJECT_PREFIX }}" \
            -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="gcp_region=${{ vars.GCP_REGION || 'us-central1' }}" \
            -var="s3_bucket_name=${S3_BUCKET}" \
            -var="aws_role_arn=${AWS_ROLE_ARN}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="azure_email_connection_string=${AZURE_CONN}" \
            -var="azure_sender_address=${AZURE_SENDER}" \
            -var="notification_email=${{ vars.NOTIFICATION_EMAIL }}" \
            -out=tfplan

      - name: Terraform Apply
        if: github.event_name != 'pull_request' && github.event.inputs.action != 'plan'
        working-directory: terraform/gcp
        run: terraform apply -auto-approve tfplan

      - name: Get Outputs
        id: outputs
        if: github.event_name != 'pull_request'
        working-directory: terraform/gcp
        run: |
          echo "function_url=$(terraform output -raw function_url)" >> "$GITHUB_OUTPUT"
          echo "eventbridge_auth_token=$(terraform output -raw eventbridge_auth_token)" >> "$GITHUB_OUTPUT"
          echo "service_account_unique_id=$(terraform output -raw service_account_unique_id)" >> "$GITHUB_OUTPUT"

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/gcp-key.json

  # =========================================================================
  # Step 3: Update AWS with GCP Function URL (EventBridge final configuration)
  # Depends on GCP (function URL + auth token)
  # =========================================================================
  deploy-aws-final:
    name: "AWS — Final Update"
    runs-on: ubuntu-latest
    needs: [deploy-gcp, deploy-aws-initial]
    if: always() && (needs.deploy-gcp.result == 'success' && needs.deploy-aws-initial.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Get AWS Account ID
        id: aws-id
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        working-directory: terraform/aws
        run: |
          terraform init \
            -backend-config="bucket=${{ env.PROJECT_PREFIX }}-tf-state-${{ steps.aws-id.outputs.account_id }}" \
            -backend-config="key=aws/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        working-directory: terraform/aws
        run: |
          # Use placeholder values for PR plans when outputs aren't available
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            FUNCTION_URL="https://placeholder-function-url.com"
            AUTH_TOKEN="placeholder-token"
            SA_UNIQUE_ID="000000000000000000000"
          else
            FUNCTION_URL="${{ needs.deploy-gcp.outputs.function_url }}"
            AUTH_TOKEN="${{ needs.deploy-gcp.outputs.eventbridge_auth_token }}"
            SA_UNIQUE_ID="${{ needs.deploy-gcp.outputs.service_account_unique_id }}"
          fi
          
          terraform plan \
            -var="project_prefix=${{ env.PROJECT_PREFIX }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="gcp_function_url=${FUNCTION_URL}" \
            -var="eventbridge_auth_token=${AUTH_TOKEN}" \
            -var="gcp_service_account_unique_id=${SA_UNIQUE_ID}" \
            -out=tfplan

      - name: Terraform Apply
        if: github.event_name != 'pull_request' && github.event.inputs.action != 'plan'
        working-directory: terraform/aws
        run: terraform apply -auto-approve tfplan

      - name: Invalidate CloudFront Cache
        if: github.event_name != 'pull_request' && github.event.inputs.action != 'plan'
        working-directory: terraform/aws
        run: |
          DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"

  # =========================================================================
  # Summary
  # =========================================================================
  summary:
    name: "Deployment Summary"
    runs-on: ubuntu-latest
    needs: [deploy-azure, deploy-aws-initial, deploy-gcp, deploy-aws-final]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "### 🔍 Plan-Only Mode (Pull Request)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "This is a plan-only run. No resources were created or modified." >> "$GITHUB_STEP_SUMMARY"
            echo "Merge this PR or run workflow manually to apply changes." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "| Component | Cloud | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Email Service | Azure | ${{ needs.deploy-azure.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Initial Setup | AWS | ${{ needs.deploy-aws-initial.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Classification Function | GCP | ${{ needs.deploy-gcp.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Final Update | AWS | ${{ needs.deploy-aws-final.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.deploy-aws-initial.result }}" == "success" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "### Endpoints" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Website:** ${{ needs.deploy-aws-initial.outputs.website_url }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **API Gateway:** ${{ needs.deploy-aws-initial.outputs.api_gateway_url }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ needs.deploy-gcp.result }}" == "success" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "- **Cloud Function:** ${{ needs.deploy-gcp.outputs.function_url }}" >> "$GITHUB_STEP_SUMMARY"
          fi
