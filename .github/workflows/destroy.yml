name: Destroy All Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm deletion of ALL infrastructure'
        required: true
        type: string

env:
  TF_VERSION: "1.7.0"
  TF_INPUT: false
  PROJECT_PREFIX: ${{ vars.PROJECT_PREFIX || 'imgclass' }}

  # AWS credentials
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

  # Azure credentials
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

permissions:
  contents: read

jobs:
  # =========================================================================
  # Gate: Require explicit confirmation
  # =========================================================================
  confirm:
    name: "Confirm Destruction"
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "destroy" ]; then
            echo "::error::You must type 'destroy' to confirm. Got: '${{ inputs.confirm }}'"
            exit 1
          fi
          echo "✓ Destruction confirmed."

  # =========================================================================
  # Step 1: Destroy AWS EventBridge (depends on nothing downstream)
  # =========================================================================
  destroy-aws:
    name: "Destroy — AWS Infrastructure"
    runs-on: ubuntu-latest
    needs: confirm
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Get AWS Account ID
        id: aws-id
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        working-directory: terraform/aws
        run: |
          terraform init \
            -backend-config="bucket=${{ env.PROJECT_PREFIX }}-tf-state-${{ steps.aws-id.outputs.account_id }}" \
            -backend-config="key=aws/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        working-directory: terraform/aws
        run: |
          terraform destroy -auto-approve \
            -var="project_prefix=${{ env.PROJECT_PREFIX }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="gcp_function_url=https://placeholder" \
            -var="eventbridge_auth_token=placeholder" \
            -var="gcp_service_account_unique_id=placeholder"

  # =========================================================================
  # Step 2: Destroy GCP (after AWS is gone)
  # =========================================================================
  destroy-gcp:
    name: "Destroy — GCP Classification Function"
    runs-on: ubuntu-latest
    needs: [confirm, destroy-aws]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Authenticate to GCP
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' | base64 -d > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> "$GITHUB_ENV"

      - name: Terraform Init
        working-directory: terraform/gcp
        run: |
          terraform init \
            -backend-config="bucket=${{ env.PROJECT_PREFIX }}-tf-state-${{ vars.GCP_PROJECT_ID }}" \
            -backend-config="prefix=gcp"

      - name: Terraform Destroy
        working-directory: terraform/gcp
        run: |
          terraform destroy -auto-approve \
            -var="project_prefix=${{ env.PROJECT_PREFIX }}" \
            -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="gcp_region=${{ vars.GCP_REGION || 'us-central1' }}" \
            -var="s3_bucket_name=placeholder" \
            -var="aws_role_arn=arn:aws:iam::000000000000:role/placeholder" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="azure_email_connection_string=placeholder" \
            -var="azure_sender_address=placeholder" \
            -var="notification_email=placeholder@example.com"

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/gcp-key.json

  # =========================================================================
  # Step 3: Destroy Azure (after GCP is gone)
  # =========================================================================
  destroy-azure:
    name: "Destroy — Azure Email Service"
    runs-on: ubuntu-latest
    needs: [confirm, destroy-gcp]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Derive Azure backend names
        id: backend
        run: |
          SUB_SHORT=$(echo "$ARM_SUBSCRIPTION_ID" | tr -d '-' | cut -c1-8)
          echo "rg_name=${{ env.PROJECT_PREFIX }}-tf-state-rg-${SUB_SHORT}" >> "$GITHUB_OUTPUT"
          echo "storage_account=${{ env.PROJECT_PREFIX }}tf${SUB_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        working-directory: terraform/azure
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ steps.backend.outputs.rg_name }}" \
            -backend-config="storage_account_name=${{ steps.backend.outputs.storage_account }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=azure.tfstate"

      - name: Terraform Destroy
        working-directory: terraform/azure
        run: |
          terraform destroy -auto-approve \
            -var="project_prefix=${{ env.PROJECT_PREFIX }}" \
            -var="azure_location=${{ vars.AZURE_LOCATION || 'eastus' }}" \
            -var="notification_email=${{ vars.NOTIFICATION_EMAIL }}"

  # =========================================================================
  # Summary
  # =========================================================================
  summary:
    name: "Destruction Summary"
    runs-on: ubuntu-latest
    needs: [destroy-aws, destroy-gcp, destroy-azure]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "## 🗑️ Destruction Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Cloud | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| All Resources | AWS | ${{ needs.destroy-aws.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Classification Function | GCP | ${{ needs.destroy-gcp.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Email Service | Azure | ${{ needs.destroy-azure.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Note:** State backends (S3, GCS, Azure Storage) were NOT destroyed." >> "$GITHUB_STEP_SUMMARY"
          echo "> Delete them using backend cleanup workflow (if no longer needed)" >> "$GITHUB_STEP_SUMMARY"
