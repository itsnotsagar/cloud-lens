name: Setup Terraform State Backends

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "create" to confirm state backend creation'
        required: true
        type: string

env:
  PROJECT_PREFIX: "imgclass"
  AWS_REGION: "us-east-1"
  GCP_REGION: "us-central1"
  AZURE_LOCATION: "eastus"

jobs:
  validate:
    name: Validate Input
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        env:
          CONFIRM_INPUT: ${{ github.event.inputs.confirm }}
        run: |
          if [ "${CONFIRM_INPUT}" != "create" ]; then
            echo "❌ Confirmation failed. Please type 'create' to proceed."
            exit 1
          fi
          echo "✅ Confirmation received"

  setup-aws-backend:
    name: Setup AWS S3 Backend
    runs-on: ubuntu-latest
    needs: validate
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Configure AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create S3 Bucket for Terraform State
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="${{ env.PROJECT_PREFIX }}-tf-state-${AWS_ACCOUNT_ID}"
          
          # Check if bucket exists
          if aws s3 ls "s3://${BUCKET_NAME}" 2>&1 | grep -q 'NoSuchBucket'; then
            echo "Creating S3 bucket: ${BUCKET_NAME}"
            aws s3api create-bucket \
              --bucket "${BUCKET_NAME}" \
              --region ${{ env.AWS_REGION }}
            
            # Enable versioning
            aws s3api put-bucket-versioning \
              --bucket "${BUCKET_NAME}" \
              --versioning-configuration Status=Enabled
            
            # Enable encryption
            aws s3api put-bucket-encryption \
              --bucket "${BUCKET_NAME}" \
              --server-side-encryption-configuration '{
                "Rules": [{
                  "ApplyServerSideEncryptionByDefault": {
                    "SSEAlgorithm": "AES256"
                  },
                  "BucketKeyEnabled": true
                }]
              }'
            
            # Block public access
            aws s3api put-public-access-block \
              --bucket "${BUCKET_NAME}" \
              --public-access-block-configuration \
                "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            
            # Add lifecycle policy to keep only last 10 versions
            aws s3api put-bucket-lifecycle-configuration \
              --bucket "${BUCKET_NAME}" \
              --lifecycle-configuration '{
                "Rules": [{
                  "ID": "RetainLast10Versions",
                  "Status": "Enabled",
                  "Filter": {"Prefix": ""},
                  "NoncurrentVersionExpiration": {
                    "NoncurrentDays": 1,
                    "NewerNoncurrentVersions": 10
                  }
                }]
              }'
            
            echo "✅ AWS S3 backend created successfully"
            echo "   Bucket: ${BUCKET_NAME}"
            echo "   Region: ${{ env.AWS_REGION }}"
            echo "   Versioning: Enabled (keep last 10 versions)"
            echo "   Encryption: AES256"
          else
            echo "ℹ️  S3 bucket already exists: ${BUCKET_NAME}"
          fi

  setup-gcp-backend:
    name: Setup GCP GCS Backend
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Authenticate to GCP
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "${GCP_SA_KEY}" | base64 -d > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project ${{ vars.GCP_PROJECT_ID }}

      - name: Create GCS Bucket for Terraform State
        run: |
          GCP_PROJECT_ID="${{ vars.GCP_PROJECT_ID }}"
          BUCKET_NAME="${{ env.PROJECT_PREFIX }}-tf-state-${GCP_PROJECT_ID}"
          
          # Check if bucket exists
          if gsutil ls -b "gs://${BUCKET_NAME}" &>/dev/null; then
            echo "ℹ️  GCS bucket already exists: ${BUCKET_NAME}"
          else
            echo "Creating GCS bucket: ${BUCKET_NAME}"
            
            gsutil mb \
              -p ${{ vars.GCP_PROJECT_ID }} \
              -l ${{ env.GCP_REGION }} \
              -b on \
              "gs://${BUCKET_NAME}"
            
            # Enable versioning
            gsutil versioning set on "gs://${BUCKET_NAME}"
            
            # Set uniform bucket-level access
            gsutil uniformbucketlevelaccess set on "gs://${BUCKET_NAME}"
            
            # Add lifecycle rule to keep only last 10 versions
            echo '{
              "lifecycle": {
                "rule": [{
                  "action": {"type": "Delete"},
                  "condition": {
                    "numNewerVersions": 10
                  }
                }]
              }
            }' > /tmp/lifecycle.json
            
            gsutil lifecycle set /tmp/lifecycle.json "gs://${BUCKET_NAME}"
            
            echo "✅ GCP GCS backend created successfully"
            echo "   Bucket: ${BUCKET_NAME}"
            echo "   Region: ${{ env.GCP_REGION }}"
            echo "   Versioning: Enabled (keep last 10 versions)"
          fi

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/gcp-key.json /tmp/lifecycle.json

  setup-azure-backend:
    name: Setup Azure Storage Backend
    runs-on: ubuntu-latest
    needs: validate
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      - name: Create Azure Storage for Terraform State
        run: |
          SUB_ID="${{ secrets.ARM_SUBSCRIPTION_ID }}"
          SUB_SHORT=$(echo "${SUB_ID}" | tr -d '-' | cut -c1-8)
          RG_NAME="${{ env.PROJECT_PREFIX }}-tf-state-rg"
          STORAGE_ACCOUNT="${{ env.PROJECT_PREFIX }}tf${SUB_SHORT}"
          CONTAINER_NAME="tfstate"
          
          # Check if resource group exists
          if ! az group show --name "${RG_NAME}" &>/dev/null; then
            echo "Creating resource group: ${RG_NAME}"
            az group create \
              --name "${RG_NAME}" \
              --location "${{ env.AZURE_LOCATION }}" \
              --tags Project=${{ env.PROJECT_PREFIX }} ManagedBy=terraform
          else
            echo "ℹ️  Resource group already exists: ${RG_NAME}"
          fi
          
          # Check if storage account exists
          if ! az storage account show --name "${STORAGE_ACCOUNT}" --resource-group "${RG_NAME}" &>/dev/null; then
            echo "Creating storage account: ${STORAGE_ACCOUNT}"
            az storage account create \
              --name "${STORAGE_ACCOUNT}" \
              --resource-group "${RG_NAME}" \
              --location "${{ env.AZURE_LOCATION }}" \
              --sku Standard_LRS \
              --encryption-services blob \
              --https-only true \
              --allow-blob-public-access false \
              --tags Project=${{ env.PROJECT_PREFIX }} ManagedBy=terraform
            
            # Enable versioning
            az storage account blob-service-properties update \
              --account-name "${STORAGE_ACCOUNT}" \
              --resource-group "${RG_NAME}" \
              --enable-versioning true
          else
            echo "ℹ️  Storage account already exists: ${STORAGE_ACCOUNT}"
          fi
          
          # Get storage account key
          ACCOUNT_KEY=$(az storage account keys list \
            --resource-group "${RG_NAME}" \
            --account-name "${STORAGE_ACCOUNT}" \
            --query '[0].value' -o tsv)
          echo "::add-mask::${ACCOUNT_KEY}"
          export AZURE_STORAGE_KEY="${ACCOUNT_KEY}"
          
          # Check if container exists
          if ! az storage container show \
            --name "${CONTAINER_NAME}" \
            --account-name "${STORAGE_ACCOUNT}" &>/dev/null; then
            echo "Creating storage container: ${CONTAINER_NAME}"
            az storage container create \
              --name "${CONTAINER_NAME}" \
              --account-name "${STORAGE_ACCOUNT}"
          else
            echo "ℹ️  Storage container already exists: ${CONTAINER_NAME}"
          fi
          
          echo "✅ Azure Storage backend created successfully"
          echo "   Resource Group: ${RG_NAME}"
          echo "   Storage Account: ${STORAGE_ACCOUNT}"
          echo "   Container: ${CONTAINER_NAME}"
          echo "   Location: ${{ env.AZURE_LOCATION }}"
          echo "   Versioning: Enabled"

  summary:
    name: Setup Summary
    runs-on: ubuntu-latest
    needs: [setup-aws-backend, setup-gcp-backend, setup-azure-backend]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "## Terraform State Backend Setup Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Provider | Status | Backend Location |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| AWS | ${{ needs.setup-aws-backend.result }} | S3 state bucket (unique per account) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GCP | ${{ needs.setup-gcp-backend.result }} | GCS state bucket (unique per project) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Azure | ${{ needs.setup-azure-backend.result }} | Azure storage (unique per subscription) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Features Enabled" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Versioning enabled on all backends" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Encryption at rest enabled" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Public access blocked" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Lifecycle policies configured (keep last 10 versions)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Next Steps" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Run \`terraform init\` in each module directory" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Deploy infrastructure using the deploy workflow" >> "$GITHUB_STEP_SUMMARY"
