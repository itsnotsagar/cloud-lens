name: Bootstrap State Backends

on:
  workflow_dispatch:
    inputs:
      gcp_project_id:
        description: 'GCP Project ID'
        required: true
        type: string

env:
  TF_VERSION: "1.7.0"
  TF_INPUT: false
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

permissions:
  contents: read

jobs:
  bootstrap:
    name: "Create State Backends"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Authenticate to GCP
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' | base64 -d > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> "$GITHUB_ENV"

      - name: Terraform Init
        working-directory: terraform/bootstrap
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/bootstrap
        run: |
          terraform apply -auto-approve \
            -var="project_prefix=imgclass" \
            -var="aws_region=${{ vars.AWS_REGION || 'us-east-1' }}" \
            -var="gcp_project_id=${{ inputs.gcp_project_id }}" \
            -var="gcp_region=${{ vars.GCP_REGION || 'us-central1' }}" \
            -var="azure_location=${{ vars.AZURE_LOCATION || 'eastus' }}"

      - name: Show Outputs
        working-directory: terraform/bootstrap
        run: terraform output

      - name: Cleanup
        if: always()
        run: rm -f /tmp/gcp-key.json
